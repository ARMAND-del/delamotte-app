<style>
  :root{--blue:#0077b6;--blue-dark:#005f8e;--blue-light:#e8f4fd;--orange:#f77f00;--gray:#f4f6f8;--border:#dde3ea;--text:#1a2332;--muted:#6b7a8d;--white:#fff;--green:#27ae60;--red:#e74c3c;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',sans-serif;background:var(--gray);color:var(--text);min-height:100vh;}
  #loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,var(--blue),var(--blue-dark));padding:20px;}
  .login-box{background:var(--white);border-radius:16px;padding:40px 32px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
  .login-logo{text-align:center;margin-bottom:32px;}
  .login-logo h1{font-size:2rem;font-weight:800;color:var(--blue);letter-spacing:2px;}
  .login-logo p{color:var(--muted);font-size:0.85rem;margin-top:4px;}
  .logo-bar{width:60px;height:4px;background:var(--orange);margin:8px auto 0;border-radius:2px;}
  .form-group{margin-bottom:18px;}
  .form-group label{display:block;font-size:0.85rem;font-weight:600;color:var(--muted);margin-bottom:6px;}
  .form-group input{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:8px;font-size:1rem;transition:border-color 0.2s;}
  .form-group input:focus{outline:none;border-color:var(--blue);}
  .btn-login{width:100%;padding:14px;background:var(--blue);color:var(--white);border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;}
  .btn-login:hover{background:var(--blue-dark);}
  .login-error{color:var(--red);font-size:0.85rem;margin-top:10px;text-align:center;display:none;}
  #app{display:none;flex-direction:column;min-height:100vh;}
  .header{background:var(--blue);color:var(--white);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.2);}
  .hname{font-size:1.3rem;font-weight:800;letter-spacing:1px;}
  .hsub{font-size:0.7rem;opacity:0.8;}
  .header-right{display:flex;align-items:center;gap:8px;}
  .user-badge{background:rgba(255,255,255,0.2);border-radius:20px;padding:4px 12px;font-size:0.8rem;font-weight:600;}
  .btn-logout{background:rgba(255,255,255,0.15);border:none;color:var(--white);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:0.8rem;}
  .cart-btn{background:var(--orange);border:none;color:var(--white);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:0.9rem;font-weight:700;position:relative;}
  .cart-count{position:absolute;top:-6px;right:-6px;background:var(--white);color:var(--orange);border-radius:50%;width:18px;height:18px;font-size:0.7rem;font-weight:800;display:flex;align-items:center;justify-content:center;}
  .nav-tabs{background:var(--white);border-bottom:2px solid var(--border);display:flex;}
  .nav-tab{padding:12px 24px;font-size:0.9rem;font-weight:600;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;transition:all 0.2s;margin-bottom:-2px;}
  .nav-tab.active{color:var(--blue);border-bottom-color:var(--blue);}
  .main{flex:1;padding:16px;max-width:1200px;margin:0 auto;width:100%;}
  .search-bar{background:var(--white);border-radius:10px;padding:12px 16px;display:flex;gap:10px;align-items:center;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
  .search-bar input{flex:1;border:none;outline:none;font-size:1rem;}
  .cat-scroll{display:flex;gap:8px;overflow-x:auto;margin-bottom:16px;padding-bottom:4px;}
  .cat-btn{padding:8px 16px;border-radius:20px;border:2px solid var(--border);background:var(--white);font-size:0.85rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.2s;}
  .cat-btn.active{background:var(--blue);color:var(--white);border-color:var(--blue);}
  .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;}
  .product-card{background:var(--white);border-radius:10px;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06);text-align:center;transition:transform 0.15s,box-shadow 0.15s;}
  .product-card:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,0.1);}
  .product-img-wrap{width:80px;height:80px;margin:0 auto 8px;border-radius:8px;overflow:hidden;background:var(--blue-light);display:flex;align-items:center;justify-content:center;}
  .product-img-wrap img{width:100%;height:100%;object-fit:contain;}
  .picon{font-size:1.8rem;}
  .product-code{font-size:0.72rem;color:var(--muted);margin-bottom:3px;}
  .product-name{font-size:0.82rem;font-weight:600;line-height:1.3;margin-bottom:10px;min-height:32px;}
  .qty-control{display:flex;align-items:center;justify-content:center;gap:6px;}
  .qty-btn{width:28px;height:28px;border-radius:6px;border:none;background:var(--blue);color:var(--white);font-size:1rem;font-weight:700;cursor:pointer;}
  .qty-input{width:40px;text-align:center;border:1px solid var(--border);border-radius:6px;padding:4px;font-size:0.9rem;}
  .btn-add{width:100%;margin-top:8px;padding:7px;background:var(--orange);color:var(--white);border:none;border-radius:6px;font-size:0.82rem;font-weight:700;cursor:pointer;}
  .cart-panel{position:fixed;bottom:0;left:0;right:0;top:0;background:rgba(0,0,0,0.5);z-index:200;display:none;align-items:flex-end;}
  .cart-panel.open{display:flex;}
  .cart-content{background:var(--white);border-radius:16px 16px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:20px;}
  .cart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .cart-header h2{font-size:1.2rem;color:var(--blue);}
  .btn-close-cart{background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--muted);}
  .cart-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .cart-meta input,.cart-meta textarea{padding:10px 12px;border:2px solid var(--border);border-radius:8px;font-size:0.9rem;width:100%;}
  .cart-meta textarea{grid-column:span 2;resize:none;}
  .cart-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
  .cart-item-name{flex:1;font-size:0.85rem;}
  .cart-item-code{font-size:0.75rem;color:var(--muted);}
  .cart-item-qty{font-weight:700;color:var(--blue);min-width:30px;text-align:center;}
  .btn-remove-item{background:none;border:none;color:var(--red);cursor:pointer;font-size:1rem;}
  .cart-empty{text-align:center;color:var(--muted);padding:30px;font-size:0.9rem;}
  .btn-send-order{width:100%;padding:14px;background:var(--green);color:var(--white);border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;}
  .stats-bar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
  .stat-card{background:var(--white);border-radius:10px;padding:14px 20px;flex:1;min-width:100px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
  .stat-num{font-size:1.8rem;font-weight:800;color:var(--blue);}
  .stat-label{font-size:0.78rem;color:var(--muted);}
  .filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
  .filter-btn{padding:6px 14px;border-radius:20px;border:2px solid var(--border);background:var(--white);font-size:0.82rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
  .filter-btn.active{background:var(--blue);color:var(--white);border-color:var(--blue);}
  .order-card{background:var(--white);border-radius:10px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
  .order-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .order-id{font-weight:700;color:var(--blue);}
  .order-status{padding:4px 10px;border-radius:20px;font-size:0.75rem;font-weight:700;}
  .status-pending{background:#fff3cd;color:#856404;}
  .status-done{background:#d4edda;color:#155724;}
  .order-info{font-size:0.85rem;color:var(--muted);margin-bottom:6px;}
  .order-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
  .btn-print{padding:7px 14px;background:var(--blue);color:var(--white);border:none;border-radius:6px;font-size:0.82rem;cursor:pointer;font-weight:600;}
  .btn-done{padding:7px 14px;background:var(--green);color:var(--white);border:none;border-radius:6px;font-size:0.82rem;cursor:pointer;font-weight:600;}
  .btn-del{padding:7px 14px;background:var(--red);color:var(--white);border:none;border-radius:6px;font-size:0.82rem;cursor:pointer;font-weight:600;}
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--white);padding:12px 24px;border-radius:8px;font-size:0.9rem;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;}
  .toast.show{opacity:1;}
  .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:2px solid var(--border);z-index:150;}
  .bottom-nav-inner{display:flex;}
  .bnav-btn{flex:1;padding:10px 0;border:none;background:none;font-size:0.7rem;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;}
  .bnav-btn.active{color:var(--blue);}
  .bnav-icon{font-size:1.3rem;}
  @media(max-width:600px){
    .main{padding:12px 10px 80px;}
    .products-grid{grid-template-columns:repeat(2,1fr);gap:10px;}
    .nav-tabs{display:none;}
    .bottom-nav{display:block;}
    .cart-meta{grid-template-columns:1fr;}
    .cart-meta textarea{grid-column:span 1;}
  }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <h1>DELAMOTTE</h1>
      <div class="logo-bar"></div>
      <p>chauffage · sanitaire · ventilation</p>
    </div>
    <div class="form-group">
      <label>Nom d'utilisateur</label>
      <input type="text" id="loginUser" placeholder="Votre nom" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Code d'accès</label>
      <input type="password" id="loginPass" placeholder="••••••••">
    </div>
    <button class="btn-login" onclick="doLogin()">Se connecter</button>
    <p class="login-error" id="loginError">Identifiants incorrects</p>
  </div>
</div>

<div id="app">
  <div class="header">
    <div><div class="hname">DELAMOTTE</div><div class="hsub">chauffage · sanitaire · ventilation</div></div>
    <div class="header-right">
      <span class="user-badge" id="userBadge"></span>
      <button class="cart-btn" onclick="openCart()">🛒 <span class="cart-count" id="cartCount">0</span></button>
      <button class="btn-logout" onclick="doLogout()">⬅</button>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showTab('catalogue')">📦 Catalogue</button>
    <button class="nav-tab" onclick="showTab('orders')">📋 Commandes</button>
  </div>
  <div class="main">
    <div id="tabCatalogue">
      <div class="search-bar">
        <span>🔍</span>
        <input type="text" id="searchInput" placeholder="Rechercher par code ou désignation..." oninput="filterProducts()">
      </div>
      <div class="cat-scroll" id="catScroll"></div>
      <div class="products-grid" id="productsGrid"></div>
    </div>
    <div id="tabOrders" style="display:none">
      <div class="stats-bar" id="statsBar"></div>
      <div class="filter-bar" id="filterBar"></div>
      <div id="ordersList"></div>
    </div>
  </div>
  <div class="bottom-nav">
    <div class="bottom-nav-inner">
      <button class="bnav-btn active" id="bnav-catalogue" onclick="showTab('catalogue');setBnav('catalogue')"><span class="bnav-icon">📦</span>Catalogue</button>
      <button class="bnav-btn" id="bnav-orders" onclick="showTab('orders');setBnav('orders')"><span class="bnav-icon">📋</span>Commandes</button>
      <button class="bnav-btn" onclick="openCart()"><span class="bnav-icon">🛒</span>Panier</button>
    </div>
  </div>
</div>

<div class="cart-panel" id="cartPanel" onclick="closeCartOutside(event)">
  <div class="cart-content">
    <div class="cart-header"><h2>🛒 Mon Panier</h2><button class="btn-close-cart" onclick="closeCart()">✕</button></div>
    <div class="cart-meta">
      <input type="text" id="cartChantier" placeholder="Nom du chantier *">
      <input type="text" id="cartChef" placeholder="Chef de chantier *">
      <textarea id="cartComment" rows="2" placeholder="Commentaire (optionnel)"></textarea>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <button class="btn-send-order" onclick="sendOrder()">✅ Envoyer la commande</button>
  </div>
</div>
<div class="toast" id="toast"></div>

// Fonction pour construire le chemin image
// Les images dans le dossier media sont nommées image1.jpeg, image2.jpeg...
// Essaie aussi .png et .jpg
function imgPath(n){
  return `media/image${n}.png`;
}

let currentUser=null,currentRole=null,cart=[],currentCat='Toutes',orderFilter='all';
emailjs.init(EMAILJS_PUBLIC_KEY);

function doLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value.trim();
  if(USERS[u]&&USERS[u].pass===p){
    currentUser=u;currentRole=USERS[u].role;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('userBadge').textContent=u+(currentRole==='admin'?' 🔑':'');
    if(currentRole!=='admin') document.getElementById('cartChef').value=u;
    buildCatalogue();renderOrders();
  } else {
    document.getElementById('loginError').style.display='block';
  }
}
document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('loginUser').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

function doLogout(){
  currentUser=null;currentRole=null;cart=[];
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('loginUser').value='';document.getElementById('loginPass').value='';
  document.getElementById('loginError').style.display='none';
}
function showTab(tab){
  document.getElementById('tabCatalogue').style.display=tab==='catalogue'?'block':'none';
  document.getElementById('tabOrders').style.display=tab==='orders'?'block':'none';
  document.querySelectorAll('.nav-tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='catalogue')||(i===1&&tab==='orders')));
  if(tab==='orders') renderOrders();
}
function setBnav(tab){
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('bnav-'+tab);if(el)el.classList.add('active');
}
const CATS=['Toutes',...new Set(CATALOGUE.map(p=>p.cat))];
function buildCatalogue(){
  document.getElementById('catScroll').innerHTML=CATS.map(c=>`<button class="cat-btn${c===currentCat?' active':''}" onclick="setCat('${c}')">${CAT_ICON[c]||'📦'} ${c}</button>`).join('');
  filterProducts();
}
function setCat(c){
  currentCat=c;
  document.getElementById('catScroll').innerHTML=CATS.map(cat=>`<button class="cat-btn${cat===c?' active':''}" onclick="setCat('${cat}')">${CAT_ICON[cat]||'📦'} ${cat}</button>`).join('');
  filterProducts();
}
function filterProducts(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const items=CATALOGUE.filter(p=>(currentCat==='Toutes'||p.cat===currentCat)&&(!q||p.code.toLowerCase().includes(q)||p.nom.toLowerCase().includes(q)));
  const g=document.getElementById('productsGrid');
  if(!items.length){g.innerHTML='<p style="color:var(--muted);grid-column:1/-1;padding:20px;text-align:center">Aucun article trouvé</p>';return;}
  const icon=c=>CAT_ICON[c]||'📦';
  g.innerHTML=items.map(p=>{
    const ic=icon(p.cat);
    const imgHtml=p.img
      ? `<img src="${imgPath(p.img)}" alt="${p.nom}" onerror="this.outerHTML='<span class=picon>${ic}</span>'">`
      : `<span class="picon">${ic}</span>`;
    return `<div class="product-card">
      <div class="product-img-wrap">${imgHtml}</div>
      <div class="product-code">${p.code}</div>
      <div class="product-name">${p.nom}</div>
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty('${p.code}',-1)">−</button>
        <input class="qty-input" type="number" min="1" value="1" id="qty_${p.code}">
        <button class="qty-btn" onclick="changeQty('${p.code}',1)">+</button>
      </div>
      <button class="btn-add" onclick="addToCart('${p.code}','${p.nom.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')">➕ Ajouter</button>
    </div>`;
  }).join('');
}
function changeQty(code,d){const i=document.getElementById('qty_'+code);if(i)i.value=Math.max(1,(parseInt(i.value)||1)+d);}
function addToCart(code,nom){
  const i=document.getElementById('qty_'+code);
  const qty=i?Math.max(1,parseInt(i.value)||1):1;
  const idx=cart.findIndex(x=>x.code===code);
  if(idx>=0)cart[idx].qty+=qty;else cart.push({code,nom,qty});
  updateCartCount();showToast(`✅ ${nom} ajouté (×${qty})`);
  if(i)i.value=1;
}
function updateCartCount(){document.getElementById('cartCount').textContent=cart.reduce((s,i)=>s+i.qty,0);}
function openCart(){renderCartItems();document.getElementById('cartPanel').classList.add('open');}
function closeCart(){document.getElementById('cartPanel').classList.remove('open');}
function closeCartOutside(e){if(e.target===document.getElementById('cartPanel'))closeCart();}
function renderCartItems(){
  const el=document.getElementById('cartItems');
  if(!cart.length){el.innerHTML='<div class="cart-empty">🛒 Votre panier est vide</div>';return;}
  el.innerHTML=cart.map((item,i)=>`
    <div class="cart-item">
      <div class="cart-item-name"><div>${item.nom}</div><div class="cart-item-code">${item.code}</div></div>
      <div class="cart-item-qty">×${item.qty}</div>
      <button class="btn-remove-item" onclick="removeFromCart(${i})">🗑</button>
    </div>`).join('');
}
function removeFromCart(i){cart.splice(i,1);renderCartItems();updateCartCount();}
function sendOrder(){
  const chantier=document.getElementById('cartChantier').value.trim();
  const chef=currentRole==='admin'?document.getElementById('cartChef').value.trim():currentUser;
  const comment=document.getElementById('cartComment').value.trim();
  if(!chantier||!cart.length){showToast('⚠️ Renseignez le chantier et ajoutez des articles');return;}
  const orders=getOrders();
  const id=`CMD-${String(orders.length+1).padStart(4,'0')}`;
  const date=new Date().toLocaleString('fr-FR');
  const order={id,chantier,chef:chef||currentUser,date,comment,items:[...cart],status:'pending',user:currentUser};
  orders.push(order);saveOrders(orders);
  emailjs.send(EMAILJS_SERVICE_ID,EMAILJS_TEMPLATE_ID,{
    order_id:id,chantier,chef:order.chef,date,
    articles:cart.map(i=>`- [${i.code}] ${i.nom} × ${i.qty}`).join('\n'),
    comment:comment||'(aucun)',total_articles:cart.reduce((s,i)=>s+i.qty,0),
    total_refs:cart.length,to_email:EMAIL_MAGASIN
  }).catch(()=>{});
  cart=[];updateCartCount();
  document.getElementById('cartChantier').value='';document.getElementById('cartComment').value='';
  closeCart();showToast(`✅ Commande ${id} envoyée !`);
}
function getOrders(){try{return JSON.parse(localStorage.getItem('delamotte_orders')||'[]');}catch{return[];}}
function saveOrders(o){localStorage.setItem('delamotte_orders',JSON.stringify(o));}
function renderOrders(){
  const all=getOrders();
  const vis=currentRole==='admin'?all:all.filter(o=>o.user===currentUser);
  const pending=vis.filter(o=>o.status==='pending').length;
  const done=vis.filter(o=>o.status==='done').length;
  document.getElementById('statsBar').innerHTML=`
    <div class="stat-card"><div class="stat-num">${vis.length}</div><div class="stat-label">Total</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--orange)">${pending}</div><div class="stat-label">En attente</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--green)">${done}</div><div class="stat-label">Traitées</div></div>`;
  document.getElementById('filterBar').innerHTML=['all','pending','done'].map(f=>`
    <button class="filter-btn${orderFilter===f?' active':''}" onclick="setFilter('${f}')">
      ${f==='all'?'Toutes':f==='pending'?'⏳ En attente':'✅ Traitées'}</button>`).join('');
  let filtered=currentRole==='admin'?all:all.filter(o=>o.user===currentUser);
  if(orderFilter==='pending')filtered=filtered.filter(o=>o.status==='pending');
  if(orderFilter==='done')filtered=filtered.filter(o=>o.status==='done');
  filtered=[...filtered].reverse();
  const el=document.getElementById('ordersList');
  if(!filtered.length){el.innerHTML='<p style="color:var(--muted);text-align:center;padding:30px">Aucune commande</p>';return;}
  el.innerHTML=filtered.map(o=>`
    <div class="order-card">
      <div class="order-top">
        <span class="order-id">${o.id}</span>
        <span class="order-status ${o.status==='done'?'status-done':'status-pending'}">${o.status==='done'?'✅ Traitée':'⏳ En attente'}</span>
      </div>
      <div class="order-info">🏗 <b>${o.chantier}</b> · 👷 ${o.chef} · 📅 ${o.date}</div>
      <div class="order-info">${o.items.length} réf. · ${o.items.reduce((s,i)=>s+i.qty,0)} art.${o.comment?' · 💬 '+o.comment:''}</div>
      <div class="order-actions">
        <button class="btn-print" onclick="printOrder('${o.id}')">🖨 Bon de commande</button>
        ${currentRole==='admin'&&o.status==='pending'?`<button class="btn-done" onclick="markDone('${o.id}')">✅ Traitée</button>`:''}
        ${currentRole==='admin'?`<button class="btn-del" onclick="deleteOrder('${o.id}')">🗑</button>`:''}
      </div>
    </div>`).join('');
}
function setFilter(f){orderFilter=f;renderOrders();}
function markDone(id){const o=getOrders(),i=o.findIndex(x=>x.id===id);if(i>=0){o[i].status='done';saveOrders(o);renderOrders();showToast('✅ Commande traitée');}}
function deleteOrder(id){if(!confirm('Supprimer ?'))return;saveOrders(getOrders().filter(o=>o.id!==id));renderOrders();showToast('🗑 Supprimée');}
function printOrder(id){
  const o=getOrders().find(x=>x.id===id);if(!o)return;
  const rows=o.items.map((item,i)=>`<tr><td>${i+1}</td><td>${item.code}</td><td>${item.nom}</td><td style="text-align:center;font-weight:700">${item.qty}</td></tr>`).join('');
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Bon ${o.id}</title>
  <style>body{font-family:Arial,sans-serif;margin:30px;color:#1a2332}
  .hd{display:flex;justify-content:space-between;border-bottom:3px solid #0077b6;padding-bottom:16px;margin-bottom:24px}
  h1{font-size:2rem;font-weight:900;color:#0077b6;letter-spacing:2px}.bar{width:50px;height:4px;background:#f77f00;margin:4px 0}
  .meta{background:#f4f6f8;border-radius:8px;padding:16px;margin-bottom:20px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .ml{font-size:0.78rem;color:#6b7a8d}.mv{font-weight:700}
  table{width:100%;border-collapse:collapse;margin-bottom:20px}
  th{background:#0077b6;color:#fff;padding:10px 12px;text-align:left;font-size:0.85rem}
  td{padding:9px 12px;border-bottom:1px solid #dde3ea;font-size:0.85rem}
  tr:nth-child(even) td{background:#f4f6f8}
  .tot{text-align:right;margin-bottom:30px;color:#6b7a8d}.tot strong{color:#0077b6;font-size:1.1rem}
  .signs{display:flex;gap:20px;margin-top:40px}.sign{flex:1;border:1px solid #dde3ea;border-radius:8px;padding:16px;min-height:80px}
  .sign p{font-size:0.8rem;color:#6b7a8d}@media print{button{display:none}}</style></head><body>
  <div class="hd">
    <div><h1>DELAMOTTE</h1><div class="bar"></div><p style="color:#6b7a8d;font-size:0.85rem">chauffage · sanitaire · ventilation</p></div>
    <div style="text-align:right"><div style="font-size:1.1rem;font-weight:700;color:#0077b6">BON DE COMMANDE</div>
    <div style="font-size:1.5rem;font-weight:800">${o.id}</div><div style="color:#6b7a8d;font-size:0.85rem">${o.date}</div></div>
  </div>
  <div class="meta">
    <div><div class="ml">CHANTIER</div><div class="mv">${o.chantier}</div></div>
    <div><div class="ml">CHEF DE CHANTIER</div><div class="mv">${o.chef}</div></div>
    <div><div class="ml">STATUT</div><div class="mv">${o.status==='done'?'✅ Traitée':'⏳ En attente'}</div></div>
    ${o.comment?`<div><div class="ml">COMMENTAIRE</div><div class="mv">${o.comment}</div></div>`:''}
  </div>
  <table><thead><tr><th>#</th><th>Code</th><th>Désignation</th><th>Qté</th></tr></thead><tbody>${rows}</tbody></table>
  <div class="tot">Total : <strong>${o.items.reduce((s,i)=>s+i.qty,0)} article(s)</strong> — ${o.items.length} référence(s)</div>
  <div class="signs"><div class="sign"><p>Signature Chef de chantier</p></div><div class="sign"><p>Signature Magasin / Visa</p></div></div>
  <script>window.onload=()=>window.print()<\/script></body></html>`);
  w.document.close();
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
</script>
